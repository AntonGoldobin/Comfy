# Portrait Generation Template Metadata
# Used by Reelant sync to upsert Style in DB

slug: portrait
name: "Portrait Generator"
description: "High-quality human portrait using SDXL"
version: "1.0"
category: "portrait"
modelSet: "sdxl"

# Cost & timing
costTokens: 50
avgDurationSec: 30
maxExpectedDurationSec: 120

# Required GPU tags
requiresTags:
  - sdxl
  - portrait

# Parameter mapping — must match CreateStyleSchema.paramMapping
paramMapping:
  prompt:
    type: text
    class_type: CLIPTextEncode
    input: text
    label: "Prompt"
    required: true
    default: ""

  negative_prompt:
    type: text
    class_type: CLIPTextEncode
    input: text
    label: "Negative Prompt"
    required: false
    default: "low quality, blurry, watermark, deformed"

  seed:
    type: number
    class_type: KSampler
    input: seed
    label: "Seed"
    required: false
    default: -1
    min: -1
    max: 999999999

  steps:
    type: number
    class_type: KSampler
    input: steps
    label: "Steps"
    required: false
    default: 30
    min: 1
    max: 100

  cfg:
    type: number
    class_type: KSampler
    input: cfg
    label: "CFG Scale"
    required: false
    default: 7.0
    min: 1.0
    max: 30.0

  model:
    type: text
    class_type: CheckpointLoaderSimple
    input: ckpt_name
    label: "Model"
    required: false
    default: "sd_xl_base_1.0.safetensors"

# Output config
output:
  node: "10"
  type: images
  subfolder: "portrait"
